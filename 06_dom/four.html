<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dom with chai aur code</title>
  </head>
  <body style="background-color: #212121; color: white">
    <ul class="language">
      <li>javascript</li>
    </ul>

    <!-- script -->
    <script>

      
      function addList(langName) {
        const li = document.createElement("li");
        li.innerText = `${langName}`;
        document.querySelector("li").appendChild(li);
      }

      addList("swift");

      const addOptiLang = (langName) => {
        const li = document.createElement("li");
        li.appendChild(document.createTextNode(langName));
        document.querySelector(".language").appendChild(li);
      };

      addOptiLang("python");





      //  edit
      const secondLang = document.querySelector("li:nth-child(2)");
      const newLi = document.createElement("li");
      newLi.textContent = "Mojo";
      secondLang.replaceWith(newLi);

      //   edit
      const firstLang = document.querySelector("li:first-child");
      firstLang.outerHTML = "<li>Golang</li>";

      // remove
      const removeOneList = document.querySelector("li:last-child");
      removeOneList.remove();
    </script>
  </body>
</html>
